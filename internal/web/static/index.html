<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dev-assist — SRE Utility Belt</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="layout">

  <!-- ── Sidebar ─────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-name">dev-assist</div>
      <div class="brand-sub">SRE Utility Belt</div>
    </div>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/>
      </svg>
      <input id="search" type="text" placeholder="filter tools…"
             autocomplete="off" spellcheck="false" />
      <button id="search-clear" class="search-clear hidden" aria-label="Clear">×</button>
    </div>

    <nav id="tool-list" class="tool-list"></nav>

    <div class="sidebar-footer">
      <button id="docs-btn" class="docs-btn" title="Docs &amp; Install">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h11A1.5 1.5 0 0 1 15 2.5v11a1.5 1.5 0 0 1-1.5
                   1.5h-11A1.5 1.5 0 0 1 1 13.5v-11zm1.5-.5a.5.5 0 0 0-.5.5v11a.5.5
                   0 0 0 .5.5h11a.5.5 0 0 0 .5-.5v-11a.5.5 0 0 0-.5-.5h-11zM4
                   5.5a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0
                   1-.5-.5zm0 2a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0
                   1-.5-.5zm0 2a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 1-.5-.5z"/>
        </svg>
        Docs &amp; Install
      </button>
    </div>
  </aside>

  <!-- ── Main area ────────────────────────────────────── -->
  <main class="main">

    <!-- Welcome splash (shown until a tool is selected) -->
    <div id="welcome" class="welcome">
      <div class="welcome-glyph">⚡</div>
      <h1 class="welcome-title">dev-assist</h1>
      <p class="welcome-sub">Select a tool from the sidebar to get started</p>
      <div class="welcome-chips">
        <span class="chip chip-cyan">SSL</span>
        <span class="chip chip-magenta">Auth</span>
        <span class="chip chip-green">Network</span>
        <span class="chip chip-yellow">Data</span>
      </div>
    </div>

    <!-- Tool panel (hidden until tool selected) -->
    <div id="tool-panel" class="tool-panel hidden">

      <div class="tool-header">
        <div class="tool-header-top">
          <span id="tool-category-badge" class="category-badge"></span>
        </div>
        <h1 id="tool-name" class="tool-name"></h1>
        <p  id="tool-desc"  class="tool-desc"></p>
        <div id="cli-hint-wrap" class="cli-hint-wrap">
          <span class="cli-hint-label">CLI</span>
          <code id="cli-hint" class="cli-hint"></code>
        </div>
      </div>

      <form id="tool-form" class="tool-form" novalidate></form>

      <div class="run-bar">
        <button id="run-btn" class="btn-run" type="button">
          <span id="run-label">▶&nbsp;&nbsp;Run</span>
          <span id="run-spinner" class="spinner hidden"></span>
        </button>
        <span id="form-error" class="form-error"></span>
      </div>

      <div id="result-wrap" class="result-wrap hidden">
        <div class="result-header">
          <span id="result-badge" class="result-badge">RESULT</span>
          <button id="copy-btn" class="btn-copy">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path d="M4 2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v10a2 2 0 0 1-2
                       2H6a2 2 0 0 1-2-2V2zm2 0v10h6V2H6zM2 4a2 2 0 0 0-2
                       2v8a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2v-1H8v1H2V6h1V4H2z"/>
            </svg>
            Copy
          </button>
        </div>
        <pre id="result-output" class="result-output"></pre>
      </div>

    </div><!-- /tool-panel -->

    <!-- Docs panel (shown when Docs & Install is clicked) -->
    <div id="docs-panel" class="docs-panel hidden"></div>

  </main>

</div><!-- /layout -->

<script src="app.js"></script>
</body>
</html>
