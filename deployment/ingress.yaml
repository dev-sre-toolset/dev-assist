apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dev-assist
  namespace: default
  labels:
    app: dev-assist
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dev-assist
                port:
                  number: 8080
